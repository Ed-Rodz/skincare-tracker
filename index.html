<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skincare Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <button id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
    <h1>Skincare Tracker</h1>
    <p id="today-date"></p>
  </header>

  <main>
    <section class="routine" id="am-section">
      <h2>☀️ Morning</h2>
      <ul class="checklist" id="am-list"></ul>
    </section>

    <section class="routine" id="pm-section">
      <h2>🌙 Evening</h2>
      <ul class="checklist" id="pm-list"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
